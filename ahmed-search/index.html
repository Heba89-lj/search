<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>اختيار النيابة</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background-image: url('./images/background2.jpg'); /* مسار الصورة */
  background-size: cover;       /* تملى الشاشة */
  background-position: top center;  /* توسيط الصورة */
  background-repeat: no-repeat; /* تمنع التكرار */
 height:90vh;
   display: flex;
}



/* الصفحة الرئيسية */
#main {
   flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 10px;
  padding: 15px;
  background: rgba(0,0,0,0.3); /* شفاف */
  backdrop-filter: blur(6px);
}


/* اللوجوهات */
.logo {
  width: 120px;
  /* margin: 20px; */
  cursor: pointer;
  animation: blink 1s infinite;
}

/* أنيميشن blink */
@keyframes blink {
  0% {opacity: 1;}
  50% {opacity: 0.3;}
  100% {opacity: 1;}
}
</style>

</head>

<body>



<!-- الصفحة الرئيسية -->
<div id="main">
 
  
  <a href=".html">
<img src="images/background.png" alt="شعار النيابة" class="logo"></a>

<a href="home.html">
<img src="images/background.png" alt="شعار النيابة" class="logo">
</a>
</div>

<script>
// بعد 2 ثانية
setTimeout(() => {
  document.getElementById("splash").style.display = "none";
  document.getElementById("main").style.display = "flex";
}, 2000);

</body>
</html>
