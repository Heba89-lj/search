


<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>اختيار النيابة</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, sans-serif;
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-end; /* آخر الشاشة */
  background-image: url('./images/background2.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

#main {
  display: flex;
  justify-content: space-around; /* المسافات متساوية */
  width: 150%;                     /* عرض الحاوية */
  padding-bottom: 60px;
}

/* اللوجوهات */
.logo-link img {
  width:100%;                  /* كل صورة 25% من العرض */
  max-width: 300px;            /* أقصى عرض (اختياري) */
  cursor: pointer;
  border-radius: 40px;          /* ممكن تحطي دائري لو عايزة */
  transition: transform 0.3s;
  background : red;
}

.logo-link img:hover {
  transform: scale(1.05);      /* تكبير عند المرور */
}

/* responsive للموبايل */
@media (max-width: 600px) {
  #main {
    flex-direction: column;     /* تتحول تحت بعض */
    gap: 15px;
    padding-bottom: 20px;
    align-items: center;
  }
  .logo-link img {
    width: 60%;                 /* عرض أكبر على الموبايل */
  }
}
</style>
</head>

<body>

<div id="main">
  <a href="page1.html" class="logo-link">
    <img src="./images/m.jpg" alt="النيابة 1">
  </a>
  <a href="home.html" class="logo-link">
    <img src="./images/logo2.png" alt="النيابة 2">
  </a>
</div>

</body>
</html>
