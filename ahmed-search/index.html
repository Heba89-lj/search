<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>اختيار النيابة</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background-image: url('./images/background2.jpg'); /* مسار الصورة */
  background-size: cover;       /* تملى الشاشة */
  background-position: top center;  /* توسيط الصورة */
  background-repeat: no-repeat; /* تمنع التكرار */
 height:100vh;
}

/* صفحة البداية */
#splash {
  position: fixed;
  width: 100%;
  height: 100vh;
  /* background: white; */
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

/* اللوجو */
#splash img {
  width: 150px;
}

/* الصفحة الرئيسية */
#main {
  display: none;
  margin-top: 100px;
}

/* اللوجوهات */
.logo {
  width: 120px;
  margin: 20px;
  cursor: pointer;
  animation: blink 1s infinite;
}

/* أنيميشن blink */
@keyframes blink {
  0% {opacity: 1;}
  50% {opacity: 0.3;}
  100% {opacity: 1;}
}
</style>

</head>

<body>

<!-- صفحة البداية -->
<div id="splash">
<img src="images/background.png" alt="شعار النيابة"></div>

<!-- الصفحة الرئيسية -->
<div id="main">
  <h2>اختر النيابة</h2>
<!-- 
  <img src="logo1.png" class="logo" onclick="goTo('https://link1.com')">
  <img src="logo2.png" class="logo" onclick="goTo('https://link2.com')"> -->
  <a href=".html">
<img src="images/background.png" alt="شعار النيابة" class="logo"></a>

<a href="home.html">
<img src="images/background.png" alt="شعار النيابة" class="logo"></a>
</a>
</div>

<script>
// بعد 2 ثانية
setTimeout(() => {
  document.getElementById("splash").style.display = "none";
  document.getElementById("main").style.display = "block";
}, 2000);

// تحويل اللينك
function goTo(link) {
  window.location.href = home.html;
}
</script>

</body>
</html>
