
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>اختيار النيابة</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, sans-serif;
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-end; /* آخر الصفحة */
  background-image: url('./images/background2.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

#main {
  display: flex;
  justify-content: space-around; /* يوزع الزرار والمسافات بينهم متساوية */
  width: 90%;                     /* عرض الحاوية */
  padding-bottom: 60px;
}

button {
  width: 25%;                     /* كل زرار 25% من الصفحة */
  padding: 15px 0;
  font-size: 58px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background-color: rgba(0,0,0,0.6);
  color: white;
  transition: 0.3s;
}

button:hover {
  background-color: rgba(0,0,0,0.8);
}

/* responsive للموبايل */
@media (max-width: 600px) {
  #main {
    flex-direction: column;  /* على الموبايل تحت بعض */
    gap: 15px;
    padding-bottom: 20px;
  }
  button {
    width: 80%;              /* كل زرار ياخد عرض أكبر على الموبايل */
  }
}
</style>
</head>

<body>

<div id="main">
  <button onclick="window.location.href='page1.html'">النيابة 1</button>
  <button onclick="window.location.href='home.html'">النيابة 2</button>
</div>

</body>
</html>
