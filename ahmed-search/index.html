   border-radius: 50%;
 }
  @keyframes pulse {
  0% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(255,255,255,0.4);
  }
  50% {
    transform: scale(1.05);
    box-shadow: 0 0 15px 5px rgba(255,255,255,0.2);

    box-shadow: 0 0 0 0 rgba(255,255,255,0);
  }
}

  backdrop-filter: blur(6px);
  cursor: pointer;
  transition: none; /* يمنع أي حركة */
