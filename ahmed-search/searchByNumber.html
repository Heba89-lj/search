

 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الاستعلام عن نتيجة الفحص</title>
  <style>
    body {
      font-family: "Cairo", sans-serif;
      direction: rtl;
      background: linear-gradient(to bottom right, #0a1f44, #1e3c72, #2a5298);
      margin: 0;
      padding: 0;
      color: #333;
      text-align: center;
       min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }

    h1 {
      color: white;
      margin-bottom: 25px;
      font-weight: bold;
    }

    input {
      width: 90%;
      max-width: 300px;
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
      text-align: right;
    }

    button {
      background: #004aad;
      color: #fff;
      border: none;
      padding: 10px 20px;
      margin-top: 10px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #003580;
    }

    table {
      width: 95%;
      max-width: 800px;
      margin: 20px auto;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #789ec7;
      color: white;
      padding: 10px;
      width: 35%;
      text-align: right;
    }

    td {
      color: black;
      padding: 10px;
      text-align: right;
      word-break: break-word;
    }

    .prewrap { white-space: pre-wrap; }

    #message {
      margin-top: 20px;
      font-weight: bold;
      color: red;
    }
    #notesModal { 
  display:none; 
  position:fixed; 
  top:0; 
  left:0; 
  width:100%; 
  height:100%; 
  background:rgba(0,0,0,0.5); 
  justify-content:center; 
  align-items:center; 
}

#notesModalContent { 
  background:white; 
  color:black; 
  padding:20px; 
  border-radius:10px; 
  max-width:400px; 
  width:90%; 
  position:relative; 
  max-height:80vh;      /* أقصى ارتفاع */
  overflow-y:auto;      /* سكرول رأسي */
  overflow-x:auto;      /* سكرول أفقي لو الجدول عريض */
}

#closeModal { 
  position:absolute; 
  top:10px; 
  right:15px; 
  cursor:pointer; 
  font-size:20px; 
}
  </style>
</head>
<body>

<div class="container">
  <h1>الاستعلام عن نتيجة الفحص</h1>

  <input type="text" id="number" placeholder="أدخل رقم الفحص">
  <input type="text" id="year" placeholder="أدخل السنة">
  <button onclick="searchData()">بحث</button>

  <div id="result"></div>
  <p id="message"></p>
</div>
   -->
  <!-- زرار الملاحظات (سيظهر فقط إذا هناك ملاحظات) -->
  <button id="notesBtn" style="display:none;">المديونية</button>

  <!-- نافذة منبثقة -->
  <div id="notesModal">
    <div id="notesModalContent">
      <span id="closeModal">&times;</span>
      <h3>بيان بالمديونية الواردة على مقدم طلب الفحص</h3>
      <table id="modalTable" style="width:100%; margin-top:10px; border-collapse:collapse;"></table>
    </div>
  </div>




  

<script>
  async function searchData() {
    const number = document.getElementById("number").value.trim();
    const year = document.getElementById("year").value.trim();
    const resultDiv = document.getElementById("result");
    const message = document.getElementById("message");

    resultDiv.innerHTML = "";
    message.textContent = "";

    if (!number || !year) {
      message.textContent = "من فضلك أدخل رقم الفحص والسنة.";
      return;
    }

    try {
      const res = await fetch(`/api/search?number=${encodeURIComponent(number)}&year=${encodeURIComponent(year)}`);
      const data = await res.json();

      if (data.success) {
        const r = data.result;

        resultDiv.innerHTML = `
          <table>
            <tr><th>رقم الفحص</th><td>${r.number || "-"}</td></tr>
            <tr><th>السنة</th><td>${r.year || "-"}</td></tr>
            <tr><th>رقم القضية</th><td>${r.caseNumber || "-"}</td></tr>
            <tr><th>اسم مقدم الطلب</th><td>${r.applicant || "-"}</td></tr>
            <tr><th>حالة الفحص</th><td>${r.status || "-"}</td></tr>
            <tr><th>ما تم في الفحص</th><td class="prewrap">${r.visa || "-"}</td></tr>
            <tr><th>ملاحظات</th><td class="prewrap">${r.notes || "-"}</td></tr>
            <tr><th>كود القضية</th><td class="prewrap">${r.code || "-"}</td></tr>
          </table>
        `;

        const notesBtn = document.getElementById("notesBtn");

        // إذا كان العمود hasNotes يحتوي على "مميكن"
        if(r.hasNotes && r.hasNotes.toString().toLowerCase().includes("مميكن")){
          notesBtn.textContent = "نموذج مميكن";
          notesBtn.style.display = "inline-block";

    //       notesBtn.onclick = () => {
    //      // تحويل المستخدم مباشرة لصفحة النموذج
    // window.location.href = "/momikn.html";
    //       }
         notesBtn.onclick = () => {
    // تمرير البيانات من نفس الصف (r) لصفحة momikn.html
const url = `momikn.html?selfName=${encodeURIComponent(r.applicant)}
&caseNumber=${encodeURIComponent(r.caseNumber)}
& number=${encodeURIComponent(r.number)}
// &requestNumber=${encodeURIComponent(r.code)}
&nationalId=${encodeURIComponent(r.nationalId || "")}`;

window.location.href = url;

        } else if(r.hasNotes && r.hasNotes.toString().toLowerCase().includes("ملاحظات")){
          notesBtn.textContent = "المديونية";
          notesBtn.style.display = "inline-block";

          notesBtn.onclick = () => {
            const modalTable = document.getElementById("modalTable");
            modalTable.innerHTML = "";

            if(r.publicProsecution) modalTable.innerHTML += `<tr><th>مطالبات نائب عام</th><td>${escapeHtml(r.publicProsecution)}</td></tr>`;
            if(r.justiceRequests) modalTable.innerHTML += `<tr><th>مطالبات وزارة العدل</th><td>${escapeHtml(r.justiceRequests)}</td></tr>`;
            if(r.taxes) modalTable.innerHTML += `<tr><th>الضرائب</th><td>${escapeHtml(r.taxes)}</td></tr>`;
            if(r.courtExecution) modalTable.innerHTML += `<tr><th>تنفيذ الأحكام</th><td>${escapeHtml(r.courtExecution)}</td></tr>`;

            document.getElementById("notesModal").style.display = "flex";
          }

        } else {
          notesBtn.style.display = "none";
        }

      } else {
        message.textContent = data.message || "لم يتم العثور على بيانات.";
        document.getElementById("notesBtn").style.display = "none";
      }

    } catch (err) {
      console.error(err);
      message.textContent = "حدث خطأ أثناء البحث.";
      document.getElementById("notesBtn").style.display = "none";
    }
  }

  // دالة لفتح نموذج المميكن
  function openMimkenForm(r){
    // هنا يمكنك وضع الكود الخاص بنموذج المميكن الذي صنعناه سابقاً
    alert("سيتم فتح نموذج المميكن للرقم " + r.number);
    // لاحقاً ممكن تفتح modal أو direct pdf
  }

  // إغلاق الـ Modal
  document.getElementById("closeModal").onclick = () => document.getElementById("notesModal").style.display = "none";
  document.getElementById("notesModal").onclick = (e) => { 
    if(e.target.id === "notesModal") e.target.style.display = "none"; 
  }

  function escapeHtml(text) {
    if (!text) return "";
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }
</script>
 </body>
 </html>
